{% extends 'base.html' %}

{% block content %}
    <div class="container">
        <div class="row">
            <div class="col s12 m8 l8" style="margin-top: 100px;">
            <div class="card">
                <div class="card-content orange-text">
                    <span class="card-title">Login</span>
                    <form action="" method="post">
                        <p>
                        {%  csrf_token %}
                        {% for field in form %}  
                            {{ field.label_tag }} <br>            
                            <div class="input-field">
                                {{ field }}
                            </div>
                        {% endfor %}
                        <button class="btn waves-effect waves-light" type="submit" name="action">
                            Login
                          </button>
                        </p>     
                    </form>

                    <div class="row">
                        <p class="orange-text" style="margin-top: 30px;">
                            Don't have an account? Create from <a href="{% url 'signup' %}" style="color: #26a69a;">here</a>
                        </p>
                    </div>
                </div>
            </div>
            </div>
        </div>
            
    </div>

{% endblock %}
